<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reCAPTCHA v2</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    /* Configuramos el body para que ocupe todo el iframe y centre el reCAPTCHA */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      justify-content: center; /* Esto es lo que lo centra horizontalmente */
      align-items: flex-start; /* Esto lo mantiene arriba para que las imágenes caigan hacia abajo */
      padding-top: 30%; /* Le da un ligero espacio desde el borde superior de la caja blanca */
      overflow: hidden; /* Esto mata cualquier barra de scroll */
    }
  </style>
</head>

<body>
  <div class="g-recaptcha" 
       data-sitekey="6LellHMsAAAAANbN3U71su657LnqUipMwq7untVx" 
       data-callback="onRecaptchaSuccess"
       data-expired-callback="onRecaptchaExpired" 
       data-size="normal">
  </div>
  
  <script>
    function onRecaptchaSuccess(token) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'recaptcha_success', token: token }, '*');
      }
    }
    function onRecaptchaExpired() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'recaptcha_expired' }, '*');
      }
    }
  </script>
</body>

</html>
